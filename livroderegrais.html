<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livro de Regras</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('');
            background-size: cover;
            background-position: center;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #1e3a8a;
            color: #fff;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .inicio {
            display: inline-block;
            margin: 10px auto;
            padding: 12px 25px;
            background-color: #2563eb;
            color: #fff;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s, background-color 0.3s;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
            font-size: 18px;
            max-width: 90%;
            text-align: center;
        }

        .inicio:hover {
            background-color: #3b82f6;
            transform: scale(1.05);
        }

        .inicio-container {
            display: flex;
            justify-content: center;
            margin: 10px 0;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            padding: 10px;
            margin: auto;
            flex: 1;
            width: 100%;
        }

        .card {
            background-size: contain;
            background-position: center;
            color: #000;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 15px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            height: 200px;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        }

        .card h3 {
            font-size: 20px;
            margin: 8px 0;
            color: #000;
        }

        .footer {
            background-color: #1e3a8a;
            color: #fff;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            width: 100%;
            margin-top: auto;
        }

        @media (max-width: 600px) {
            header {
                font-size: 20px;
                padding: 10px;
            }
            .inicio {
                font-size: 16px;
                padding: 10px 20px;
            }
            .container {
                grid-template-columns: 1fr;
                padding: 5px;
            }
            .card {
                height: 150px;
            }
            .card h3 {
                font-size: 18px;
            }
            .footer {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
<header>Livro de Regras</header>
<div class="inicio-container">
    <a class="inicio" href="https://arbitragemslaad.github.io/slaad/">Voltar ao Início</a>
</div>
<div class="container">
    <a class="card" style="background-image: url('../slaad/imagem/logo2.jpg');" href="https://conteudo.cbf.com.br/cdn/201910/20191028182833_565.pdf"><h3>Futebol</h3></a>
    <a class="card" style="background-image: url('../slaad/imagem/logo2.jpg');" href="https://cbfs.com.br/cbfsadm/arquivos/Site/228_.pdf"><h3>Futsal</h3></a>
    <a class="card" style="background-image: url('../slaad/imagem/logo2.jpg');" href="https://cbf7.com.br/Documentos/Livro%20de%20Regras%20FUT7.pdf"><h3>Fut 7</h3></a>
    <a class="card" style="background-image: url('../slaad/imagem/logo2.jpg');" href="https://files.cercomp.ufg.br/weby/up/155/o/REGRAS_HANDEBOL.pdf"><h3>Handebol</h3></a>
    <a class="card" style="background-image: url('../slaad/imagem/logo2.jpg');" href="https://www.cbb.com.br/wp-content/uploads/Regras-Oficiais-Basketball-2024-ALTERACOES-ABRIL-2024-REVISAO-JANEIRO-2025_1.pdf"><h3>Basquetebol</h3></a>
    <a class="card" style="background-image: url('../slaad/imagem/logo2.jpg');" href="https://files.cercomp.ufg.br/weby/up/155/o/REGRAS_DO_V%C3%94LEI.pdf"><h3>Voleibol</h3></a>
</div>
<footer class="footer">© 2025 - Livro de Regras</footer>
</body>
</html>
